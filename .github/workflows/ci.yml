name: CI

on:
  pull_request:
    branches: ['*']

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx turbo run check-types

      - name: ESLint
        run: npx turbo run lint

      - name: Build
        run: npx turbo run build

  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx turbo run build

      - name: Check bundle size
        run: |
          # Check initial JS bundle size
          BUNDLE_SIZE=$(du -sb apps/web/.next/static/chunks | cut -f1)
          BUNDLE_KB=$((BUNDLE_SIZE / 1024))
          echo "Bundle size: ${BUNDLE_KB}KB"
          if [ $BUNDLE_KB -gt 130 ]; then
            echo "::error::Bundle size ${BUNDLE_KB}KB exceeds 130KB limit"
            exit 1
          elif [ $BUNDLE_KB -gt 100 ]; then
            echo "::warning::Bundle size ${BUNDLE_KB}KB exceeds 100KB warning threshold"
          fi
